<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Artezo Store - Category</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../Header/header.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Zain:wght@200;300;400;700;800;900&display=swap"
    rel="stylesheet" />

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* Skeleton shimmer */
    .skeleton-pulse {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#1D3C4A",
            accent: "#E39F32",
          },
          fontFamily: {
            lexend: ["Lexend", "sans-serif"],
            zain: ["Zain", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>

<body class="antialiased text-stone-700 bg-stone-50">

  <!-- ═══════════════════════════════════════════════════════════════
       HEADER (injected by load-header.js)
  ═══════════════════════════════════════════════════════════════ -->
  <div id="header-container"></div>

  <!-- ═══════════════════════════════════════════════════════════════
       HERO BANNER
  ═══════════════════════════════════════════════════════════════ -->
  <section class="py-2 flex justify-center">
    <div class="w-full max-w-7xl mx-4 sm:mx-6 lg:mx-8 relative rounded-xl overflow-hidden shadow-lg">
      <img src="../Images/banner1.jpg" alt="Category Banner"
        class="w-full h-[160px] sm:h-[200px] md:h-[240px] lg:h-[280px] object-cover object-center">
      <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-black/30 to-transparent"></div>
      <div class="absolute top-1/2 -translate-y-1/2 left-6 sm:left-10 md:left-16 text-white">
        <!-- Breadcrumb -->
        <nav class="text-xs text-white/70 font-lexend mb-1 flex items-center gap-1">
          <a href="../index.html" class="hover:text-white transition">Home</a>
          <span>/</span>
          <span id="categoryBreadcrumb" class="text-white/90">Category</span>
        </nav>
        <h1 id="categoryPageTitle"
            data-category-title
            class="text-xl sm:text-2xl md:text-3xl lg:text-4xl font-light font-zain text-white">
          Category
        </h1>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════════════════════════ -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

    <!-- Product count + sort row -->
    <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
      <p id="categoryProductCount" class="text-sm text-gray-500 font-lexend">Loading…</p>
    </div>

    <!-- Error state -->
    <div id="categoryError"
         class="hidden text-center py-16 text-gray-500 font-lexend text-sm bg-white rounded-xl border border-gray-100 shadow-sm">
    </div>

    <!-- Skeleton grid -->
    <div id="categorySkeletonGrid"
         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4"
         style="display: none;">
      <!-- 8 skeleton cards -->
      <div class="rounded-xl overflow-hidden bg-white border border-gray-100 shadow-sm">
        <div class="skeleton-pulse aspect-square"></div>
        <div class="p-3 space-y-2">
          <div class="skeleton-pulse h-4 rounded w-3/4"></div>
          <div class="skeleton-pulse h-3 rounded w-1/2"></div>
          <div class="skeleton-pulse h-5 rounded w-2/3"></div>
        </div>
      </div>
      <div class="rounded-xl overflow-hidden bg-white border border-gray-100 shadow-sm">
        <div class="skeleton-pulse aspect-square"></div>
        <div class="p-3 space-y-2">
          <div class="skeleton-pulse h-4 rounded w-3/4"></div>
          <div class="skeleton-pulse h-3 rounded w-1/2"></div>
          <div class="skeleton-pulse h-5 rounded w-2/3"></div>
        </div>
      </div>
      <div class="rounded-xl overflow-hidden bg-white border border-gray-100 shadow-sm">
        <div class="skeleton-pulse aspect-square"></div>
        <div class="p-3 space-y-2">
          <div class="skeleton-pulse h-4 rounded w-3/4"></div>
          <div class="skeleton-pulse h-3 rounded w-1/2"></div>
          <div class="skeleton-pulse h-5 rounded w-2/3"></div>
        </div>
      </div>
      <div class="rounded-xl overflow-hidden bg-white border border-gray-100 shadow-sm">
        <div class="skeleton-pulse aspect-square"></div>
        <div class="p-3 space-y-2">
          <div class="skeleton-pulse h-4 rounded w-3/4"></div>
          <div class="skeleton-pulse h-3 rounded w-1/2"></div>
          <div class="skeleton-pulse h-5 rounded w-2/3"></div>
        </div>
      </div>
      <div class="rounded-xl overflow-hidden bg-white border border-gray-100 shadow-sm">
        <div class="skeleton-pulse aspect-square"></div>
        <div class="p-3 space-y-2">
          <div class="skeleton-pulse h-4 rounded w-3/4"></div>
          <div class="skeleton-pulse h-3 rounded w-1/2"></div>
          <div class="skeleton-pulse h-5 rounded w-2/3"></div>
        </div>
      </div>
      <div class="rounded-xl overflow-hidden bg-white border border-gray-100 shadow-sm">
        <div class="skeleton-pulse aspect-square"></div>
        <div class="p-3 space-y-2">
          <div class="skeleton-pulse h-4 rounded w-3/4"></div>
          <div class="skeleton-pulse h-3 rounded w-1/2"></div>
          <div class="skeleton-pulse h-5 rounded w-2/3"></div>
        </div>
      </div>
      <div class="rounded-xl overflow-hidden bg-white border border-gray-100 shadow-sm">
        <div class="skeleton-pulse aspect-square"></div>
        <div class="p-3 space-y-2">
          <div class="skeleton-pulse h-4 rounded w-3/4"></div>
          <div class="skeleton-pulse h-3 rounded w-1/2"></div>
          <div class="skeleton-pulse h-5 rounded w-2/3"></div>
        </div>
      </div>
      <div class="rounded-xl overflow-hidden bg-white border border-gray-100 shadow-sm">
        <div class="skeleton-pulse aspect-square"></div>
        <div class="p-3 space-y-2">
          <div class="skeleton-pulse h-4 rounded w-3/4"></div>
          <div class="skeleton-pulse h-3 rounded w-1/2"></div>
          <div class="skeleton-pulse h-5 rounded w-2/3"></div>
        </div>
      </div>
    </div>

    <!-- Product grid — populated by homecategory.js -->
    <div id="categoryProductGrid"
         class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 lg:grid-cols-5 gap-3 md:gap-4">
    </div>

    <!-- Empty state -->
    <div id="categoryEmptyState"
         class="hidden text-center py-20 flex flex-col items-center">
      <i class="far fa-frown text-5xl mb-4" style="color:#e39f32;"></i>
      <p class="text-gray-500 text-lg font-lexend">No products found in this category.</p>
      <a href="../index.html"
         class="mt-5 px-6 py-2.5 rounded-full text-sm font-medium text-white transition hover:opacity-90"
         style="background:#1D3C4A;">
        Back to Home
      </a>
    </div>

    <!-- Pagination — populated by homecategory.js -->
    <div id="categoryPagination"></div>

  </main>

  <!-- ═══════════════════════════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════════════════════════ -->
  <div id="footer-container"></div>

  <!-- Scripts -->
   <script src="/auth.js"></script>
  <script src="../Header/load-header.js" defer></script>
  <script src="../Header/header.js" defer></script>
  <script src="../Footer/footer-loader.js"></script>
  <script src="../HomeCategory/homecategory.js"></script>

</body>
</html>
