<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile • Artezo</title>

    <!-- Tailwind + Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- Toastify CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../Header/header.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#033E59",
                        accent: "#E6A62C",
                        cream: "#FFF8EC",
                        warmgray: "#F9F3E9",
                    },
                    fontFamily: {
                        lexend: ["Lexend", "sans-serif"],
                        zain: ["Zain", "sans-serif"],
                    },
                },
            },
        };
    </script>

    <style>
        /* modern card styles with warm tones */
        .info-card {
            background: linear-gradient(135deg, #FFF7EA 0%, #FEF7E9 100%);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -8px rgba(230, 166, 44, 0.15);
            border: 1px solid rgba(230, 166, 44, 0.25);
            transition: all 0.2s;
        }

        .info-card:hover {
            border-color: #E6A62C;
            box-shadow: 0 15px 30px -8px rgba(230, 166, 44, 0.25);
            background: #FFFBF2;
        }

        .field-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9B7B4A;
            font-weight: 600;
        }

        .field-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #033E59;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.2rem;
        }

        .field-value i {
            color: #E6A62C;
            font-size: 1rem;
            width: 1.4rem;
        }

        .address-compact-card {
            background: #FFFFFF;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            border: 1px solid #FFE9CE;
            transition: all 0.2s;
            box-shadow: 0 4px 10px -4px rgba(230, 166, 44, 0.08);
            cursor: pointer;
        }

        .address-compact-card:hover {
            border-color: #E6A62C;
            background-color: #FFFBF0;
            box-shadow: 0 8px 18px -6px rgba(230, 166, 44, 0.15);
        }

        .address-compact-card.default {
            background: #FFF3DD;
            border-color: #E6A62C;
            border-width: 1.5px;
        }

        .badge-type {
            background: #FCE9D2;
            padding: 0.25rem 0.9rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: #7B5832;
        }

        .badge-default {
            background: #E6A62C;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .btn-outline-accent {
            border: 1.5px solid #E6A62C;
            color: #033E59;
            background: #FFF9EE;
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-outline-accent:hover {
            background: #E6A62C;
            color: white;
            border-color: #E6A62C;
        }

        .warm-sidebar {
            background: #FFFBF5;
            border: 1px solid #FFE9D4;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 1.5rem;
            max-width: 550px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #FFDDB0;
        }

        input,
        select,
        textarea {
            background-color: #FFFCF7;
            border: 1px solid #FFD9B0;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #E6A62C;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230, 166, 44, 0.15);
        }

        .toastify-custom {
            font-family: 'Lexend', sans-serif;
            border-radius: 12px !important;
            padding: 12px 20px !important;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15) !important;
            font-weight: 500;
        }

        .toastify-success {
            background: linear-gradient(135deg, #033E59 0%, #045a7a 100%) !important;
            border-left: 4px solid #E6A62C !important;
        }

        .toastify-error {
            background: linear-gradient(135deg, #991b1b 0%, #b91c1c 100%) !important;
            border-left: 4px solid #fca5a5 !important;
        }

        .toastify-warning {
            background: linear-gradient(135deg, #92400e 0%, #b45309 100%) !important;
            border-left: 4px solid #fcd34d !important;
        }

        .toastify-info {
            background: linear-gradient(135deg, #065666 0%, #0891b2 100%) !important;
            border-left: 4px solid #7dd3fc !important;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(230, 166, 44, 0.3);
            border-radius: 50%;
            border-top-color: #E6A62C;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .profile-loading {
            text-align: center;
            padding: 3rem;
            color: #033E59;
        }

        .disabled-input {
            background-color: #f5f0e8;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .address-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .action-icon {
            color: #9B7B4A;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .action-icon:hover {
            color: #E6A62C;
        }

        .delete-icon:hover {
            color: #dc2626;
        }
    </style>
</head>

<body class="bg-white font-lexend">

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="/auth.js"></script>
    <script src="../Header/load-header.js" defer></script>
    <script src="../Header/header.js" defer></script>
    <script src="./Footer/footer-loader.js"></script>

    <script>
        // ========== CONFIGURATION ==========
        const BASE_URL = "http://localhost:8085";
        const GET_USER_ENDPOINT = "/api/users/get-user";
        const PATCH_USER_ENDPOINT = "/api/users/patch-user";
        const SHIPPING_BASE = "/api/shipping-addresses";

        // Helper toast
        function showToast(message, type = 'success', duration = 3000) {
            let className = type === 'success' ? 'toastify-success' : (type === 'error' ? 'toastify-error' : (type === 'warning' ? 'toastify-warning' : 'toastify-info'));
            Toastify({ text: message, duration, close: true, gravity: "top", position: "right", stopOnFocus: true, className: `toastify-custom ${className}` }).showToast();
        }

        function getUserIdFromStorage() { 
            const userId = localStorage.getItem('userId');
            if (!userId) {
                console.warn("No userId found in localStorage");
                return null;
            }
            return userId;
        }

        // ---------- USER PROFILE (unchanged) ----------
        async function fetchUserProfile() {
            const userId = getUserIdFromStorage();
            if (!userId) throw new Error("No userId found in localStorage");
            const response = await fetch(`${BASE_URL}${GET_USER_ENDPOINT}/${userId}`);
            if (!response.ok) throw new Error(`API error ${response.status}: ${await response.text()}`);
            return await response.json();
        }

        async function updateUserProfile(payload) {
            const userId = getUserIdFromStorage();
            const response = await fetch(`${BASE_URL}${PATCH_USER_ENDPOINT}/${userId}`, { 
                method: 'PATCH', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
            });
            if (!response.ok) throw new Error(await response.text());
            return await response.json();
        }

        let currentUser = null;

        function renderSidebar(user) {
            const sidebar = document.getElementById("profile-sidebar");
            if (!user) { sidebar.innerHTML = `<div class="text-center text-primary">No user data</div>`; return; }
            const fullNameDisplay = user.fullName || (user.firstName + " " + (user.lastName || ""));
            const avatarUrl = user.avatar || `https://ui-avatars.com/api/?background=E6A62C&color=fff&name=${encodeURIComponent(fullNameDisplay)}`;
            sidebar.innerHTML = `<div class="text-center mb-6"><img src="${avatarUrl}" class="w-24 h-24 rounded-full mx-auto mb-3 border-4 border-accent/30 shadow-md object-cover"><h3 class="font-semibold text-lg text-primary">${escapeHtml(fullNameDisplay)}</h3><p class="text-sm text-amber-700">${escapeHtml(user.email || '')}</p></div><div class="space-y-2 text-sm"><a href="#" class="block px-4 py-3 rounded-lg bg-accent/20 text-primary font-medium border-l-4 border-accent"><i class="fa fa-user mr-2"></i>Profile</a><a href="../Myorders/orders.html" class="block px-4 py-3 rounded-lg hover:bg-amber-50 text-gray-700"><i class="fa fa-box mr-2"></i>Orders</a><a href="../Wishlist/wishlist.html" class="block px-4 py-3 rounded-lg hover:bg-amber-50 text-gray-700"><i class="fa fa-heart mr-2"></i>Wishlist</a></div>`;
        }
        
        function escapeHtml(str) { 
            if (!str) return ''; 
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function updateDisplayView() { 
            if (!currentUser) return; 
            document.getElementById('displayName').textContent = currentUser.fullName || (currentUser.firstName + " " + (currentUser.lastName || "")); 
            document.getElementById('displayEmail').textContent = currentUser.email || '—'; 
            document.getElementById('displayPhone').textContent = currentUser.phone || '—'; 
            const nameParts = `${currentUser.firstName || ''} ${currentUser.middleName || ''} ${currentUser.lastName || ''}`.trim(); 
            document.getElementById('displayFullDetails').innerHTML = nameParts || '—'; 
        }
        
        function populateModal() { 
            if (!currentUser) return; 
            document.getElementById('modalFullName').value = currentUser.fullName || ''; 
            document.getElementById('modalFirstName').value = currentUser.firstName || ''; 
            document.getElementById('modalMiddleName').value = currentUser.middleName || ''; 
            document.getElementById('modalLastName').value = currentUser.lastName || ''; 
            document.getElementById('modalEmail').value = currentUser.email || ''; 
            document.getElementById('modalPhone').value = currentUser.phone || ''; 
        }
        
        function openEditModal() { 
            if (!currentUser) { showToast("Profile not loaded", "warning"); return; } 
            populateModal(); 
            document.getElementById('editProfileModal').classList.add('active'); 
        }
        
        function closeEditModal() { 
            document.getElementById('editProfileModal').classList.remove('active'); 
        }
        
        async function saveProfileChanges() { 
            if (!currentUser) return; 
            const payload = { 
                email: document.getElementById('modalEmail').value.trim(), 
                firstName: document.getElementById('modalFirstName').value.trim(), 
                fullName: document.getElementById('modalFullName').value.trim(), 
                lastName: document.getElementById('modalLastName').value.trim(), 
                middleName: document.getElementById('modalMiddleName').value.trim(), 
                phone: document.getElementById('modalPhone').value.trim() 
            }; 
            if (!payload.email) { showToast("Email required", "warning"); return; } 
            const saveBtn = document.getElementById('saveModalBtn'); 
            const originalText = saveBtn.innerHTML; 
            saveBtn.innerHTML = '<span class="loading-spinner"></span> Saving...'; 
            saveBtn.disabled = true; 
            try { 
                const updated = await updateUserProfile(payload); 
                currentUser = { ...currentUser, ...updated }; 
                renderSidebar(currentUser); 
                updateDisplayView(); 
                showToast("Profile updated!", "success"); 
                closeEditModal(); 
            } catch (err) { 
                showToast(err.message, "error"); 
            } finally { 
                saveBtn.innerHTML = originalText; 
                saveBtn.disabled = false; 
            } 
        }

        // ========== SHIPPING ADDRESS API INTEGRATION ==========
        const shippingAPI = {
            getAll: async (userId) => { 
                const url = `${BASE_URL}${SHIPPING_BASE}/get-user-addresses/${userId}`;
                console.log("Fetching addresses from:", url);
                const response = await fetch(url);
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error("Address fetch failed:", response.status, errorText);
                    throw new Error(`Failed to fetch addresses: ${response.status} ${errorText}`);
                }
                const data = await response.json();
                console.log("Addresses received:", data);
                return data;
            },
            create: async (userId, payload) => { 
                const url = `${BASE_URL}${SHIPPING_BASE}/create-address/${userId}`;
                console.log("Creating address at:", url, payload);
                const response = await fetch(url, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                if (!response.ok) throw new Error(await response.text());
                return await response.json();
            },
            update: async (userId, shippingId, payload) => { 
                const url = `${BASE_URL}${SHIPPING_BASE}/patch/${userId}/${shippingId}`;
                console.log("Updating address at:", url, payload);
                const response = await fetch(url, { 
                    method: 'PATCH', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                if (!response.ok) throw new Error(await response.text());
                return await response.json();
            },
            delete: async (userId, shippingId) => { 
                const url = `${BASE_URL}${SHIPPING_BASE}/delete-address/${userId}/${shippingId}`;
                console.log("Deleting address at:", url);
                const response = await fetch(url, { method: 'DELETE' });
                if (!response.ok) throw new Error("Delete failed");
                return await response.json();
            }
        };

        let addressesList = [];

        async function loadAddresses() {
            const userId = getUserIdFromStorage();
            if (!userId) {
                console.warn("No userId found, cannot load addresses");
                document.getElementById('addressesListContainer').innerHTML = `<div class="text-center text-red-500 p-4">Please login to view addresses</div>`;
                return;
            }
            
            const container = document.getElementById('addressesListContainer');
            container.innerHTML = `<div class="text-center py-4"><div class="loading-spinner mx-auto mb-2"></div><p>Loading addresses...</p></div>`;
            
            try {
                const data = await shippingAPI.getAll(userId);
                addressesList = Array.isArray(data) ? data : [];
                renderAddresses();
            } catch (err) { 
                console.error("Load addresses error:", err);
                container.innerHTML = `<div class="text-center text-red-500 p-4"><i class="fa-solid fa-circle-exclamation"></i> ${err.message}<br><button id="retryAddresses" class="mt-2 bg-accent text-primary px-4 py-1 rounded-full text-sm">Retry</button></div>`; 
                const retryBtn = document.getElementById('retryAddresses'); 
                if(retryBtn) retryBtn.onclick = () => loadAddresses(); 
            }
        }

        function renderAddresses() {
            const container = document.getElementById('addressesListContainer');
            if (!addressesList.length) { 
                container.innerHTML = `<div class="address-compact-card text-center text-gray-500 py-4"><i class="fa-regular fa-address-card text-accent mr-2"></i> No addresses saved. Click "Add New Address" to create one.</div>`; 
                return; 
            }
            
            container.innerHTML = addressesList.map(addr => `
                <div class="address-compact-card ${addr.default ? 'default' : ''}" data-id="${addr.shippingId}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 flex-wrap mb-1">
                                <span class="font-bold text-primary">${escapeHtml(addr.customerName || '')}</span> 
                                ${addr.default ? '<span class="badge-default text-[10px] ml-2">Default</span>' : ''}
                            </div>
                            <p class="text-sm text-gray-700"><i class="fa-solid fa-phone-alt text-accent text-xs mr-1"></i> ${escapeHtml(addr.customerPhone || '')} &nbsp;|&nbsp; <i class="fa-regular fa-envelope text-accent text-xs mr-1"></i> ${escapeHtml(addr.customerEmail || '')}</p>
                            <p class="text-sm text-gray-700 mt-1"><i class="fa-solid fa-location-dot text-accent text-xs mr-1"></i> ${escapeHtml(addr.flatNo || '')}, ${escapeHtml(addr.shippingAddress || '')}, ${escapeHtml(addr.shippingCity || '')}, ${escapeHtml(addr.shippingState || '')} - ${escapeHtml(addr.shippingPincode || '')}</p>
                            ${(addr.nearBy || addr.landmark) ? `<p class="text-xs text-amber-700 mt-1"><i class="fa-regular fa-flag"></i> Near: ${escapeHtml(addr.nearBy || '')} ${addr.landmark ? `, Landmark: ${escapeHtml(addr.landmark)}` : ''}</p>` : ''}
                        </div>
                        <div class="address-actions">
                            <i class="fa-regular fa-pen-to-square action-icon edit-address" data-id="${addr.shippingId}" title="Edit"></i>
                            <i class="fa-regular fa-trash-can action-icon delete-icon delete-address" data-id="${addr.shippingId}" title="Delete"></i>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.edit-address').forEach(btn => btn.addEventListener('click', (e) => { 
                e.stopPropagation(); 
                const id = parseInt(btn.dataset.id); 
                openAddressModalForEdit(id); 
            }));
            
            document.querySelectorAll('.delete-address').forEach(btn => btn.addEventListener('click', async (e) => { 
                e.stopPropagation(); 
                const id = parseInt(btn.dataset.id); 
                if (confirm("Delete this address?")) await deleteAddressById(id); 
            }));
        }

        async function deleteAddressById(shippingId) {
            const userId = getUserIdFromStorage();
            if (!userId) return;
            try {
                await shippingAPI.delete(userId, shippingId);
                showToast("Address deleted successfully", "success");
                await loadAddresses();
            } catch (err) { 
                showToast(err.message, "error"); 
            }
        }

        function resetAddressForm() { 
            document.getElementById('editShippingId').value = ''; 
            document.getElementById('addrCustomerName').value = currentUser?.fullName || currentUser?.firstName || ''; 
            document.getElementById('addrPhone').value = currentUser?.phone || ''; 
            document.getElementById('addrEmail').value = currentUser?.email || ''; 
            document.getElementById('addrFlatNo').value = ''; 
            document.getElementById('addrShippingAddress').value = ''; 
            document.getElementById('addrCity').value = ''; 
            document.getElementById('addrState').value = ''; 
            document.getElementById('addrPincode').value = ''; 
            document.getElementById('addrNearBy').value = ''; 
            document.getElementById('addrLandmark').value = ''; 
            document.getElementById('addrIsDefault').checked = false; 
            document.getElementById('addressModalTitle').innerText = "Add New Address"; 
        }
        
        function openAddressModalForEdit(shippingId) {
            const addr = addressesList.find(a => a.shippingId === shippingId);
            if (!addr) return;
            document.getElementById('editShippingId').value = addr.shippingId;
            document.getElementById('addrCustomerName').value = addr.customerName || '';
            document.getElementById('addrPhone').value = addr.customerPhone || '';
            document.getElementById('addrEmail').value = addr.customerEmail || '';
            document.getElementById('addrFlatNo').value = addr.flatNo || '';
            document.getElementById('addrShippingAddress').value = addr.shippingAddress || '';
            document.getElementById('addrCity').value = addr.shippingCity || '';
            document.getElementById('addrState').value = addr.shippingState || '';
            document.getElementById('addrPincode').value = addr.shippingPincode || '';
            document.getElementById('addrNearBy').value = addr.nearBy || '';
            document.getElementById('addrLandmark').value = addr.landmark || '';
            document.getElementById('addrIsDefault').checked = addr.default === true;
            document.getElementById('addressModalTitle').innerText = "Edit Address";
            document.getElementById('addressModal').classList.add('active');
        }

        function openAddAddressModal() { 
            resetAddressForm(); 
            document.getElementById('addressModal').classList.add('active'); 
        }
        
        function closeAddressModal() { 
            document.getElementById('addressModal').classList.remove('active'); 
        }

        async function saveAddressHandler() {
            const userId = getUserIdFromStorage();
            if (!userId) { 
                showToast("User not logged in", "error"); 
                return; 
            }
            
            const shippingId = document.getElementById('editShippingId').value;
            const payload = {
                customerName: document.getElementById('addrCustomerName').value.trim(),
                customerPhone: document.getElementById('addrPhone').value.trim(),
                customerEmail: document.getElementById('addrEmail').value.trim(),
                flatNo: document.getElementById('addrFlatNo').value.trim(),
                shippingAddress: document.getElementById('addrShippingAddress').value.trim(),
                shippingCity: document.getElementById('addrCity').value.trim(),
                shippingState: document.getElementById('addrState').value.trim(),
                shippingPincode: document.getElementById('addrPincode').value.trim(),
                nearBy: document.getElementById('addrNearBy').value.trim(),
                landmark: document.getElementById('addrLandmark').value.trim(),
                isDefault: document.getElementById('addrIsDefault').checked
            };
            
            if (!payload.customerName || !payload.customerPhone || !payload.customerEmail || 
                !payload.flatNo || !payload.shippingAddress || !payload.shippingCity || 
                !payload.shippingState || !payload.shippingPincode) { 
                showToast("Please fill all required fields (marked with *)", "warning"); 
                return; 
            }
            
            const saveBtn = document.getElementById('saveAddressBtn');
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<span class="loading-spinner"></span> Saving...';
            saveBtn.disabled = true;
            
            try {
                if (shippingId) { 
                    await shippingAPI.update(userId, parseInt(shippingId), payload); 
                    showToast("Address updated successfully", "success"); 
                } else { 
                    await shippingAPI.create(userId, payload); 
                    showToast("Address added successfully", "success"); 
                }
                await loadAddresses();
                closeAddressModal();
            } catch (err) { 
                showToast(err.message, "error"); 
            } finally { 
                saveBtn.innerHTML = originalText; 
                saveBtn.disabled = false; 
            }
        }

        // Initialize page
        async function initPage() {
            const sidebarDiv = document.getElementById('profile-sidebar');
            sidebarDiv.innerHTML = `<div class="text-center py-8"><div class="loading-spinner mx-auto mb-2"></div><p>Loading profile...</p></div>`;
            
            try {
                const user = await fetchUserProfile();
                currentUser = user;
                renderSidebar(currentUser);
                updateDisplayView();
                await loadAddresses();
                showToast(`Welcome back, ${currentUser.firstName || 'User'}!`, "info", 2000);
            } catch (error) {
                console.error("Init error:", error);
                sidebarDiv.innerHTML = `<div class="text-center text-red-600 py-4"><i class="fa-solid fa-circle-exclamation text-2xl mb-2"></i><p>Failed to load profile: ${error.message}</p><button id="retryBtn" class="mt-3 bg-accent text-primary px-4 py-1 rounded-full">Retry</button></div>`;
                const retryBtn = document.getElementById('retryBtn'); 
                if (retryBtn) retryBtn.onclick = () => location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initPage();
            document.getElementById('editProfileBtnMain').addEventListener('click', openEditModal);
            document.getElementById('closeModalBtn').addEventListener('click', closeEditModal);
            document.getElementById('cancelModalBtn').addEventListener('click', closeEditModal);
            document.getElementById('editProfileModal').addEventListener('click', (e) => { if (e.target === document.getElementById('editProfileModal')) closeEditModal(); });
            document.getElementById('saveModalBtn').addEventListener('click', saveProfileChanges);
            document.getElementById('addAddressBtn').addEventListener('click', openAddAddressModal);
            document.getElementById('closeAddressModalBtn').addEventListener('click', closeAddressModal);
            document.getElementById('cancelAddressBtn').addEventListener('click', closeAddressModal);
            document.getElementById('saveAddressBtn').addEventListener('click', saveAddressHandler);
            document.getElementById('addressModal').addEventListener('click', (e) => { if (e.target === document.getElementById('addressModal')) closeAddressModal(); });
        });
    </script>
</body>

</html>
