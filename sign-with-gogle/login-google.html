<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login</title>

    <style>
        body {
            font-family: "Segoe UI", Roboto, Arial;
            background: #f5f7fb;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dadce0;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
        }

        button:hover {
            background: #f1f3f4;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Sign in</h2>

    <a href="http://localhost:8085/oauth2/authorization/google">
        <button>
            <img src="https://developers.google.com/identity/images/g-logo.png" width="18" />
            Sign in with Google
        </button>
    </a>
</div>

<script src="/sign-with-gogle/login-google.js">
</script>
</body>
</html>
