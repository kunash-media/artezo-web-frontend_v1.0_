<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artezo · premium product</title>
  <!-- Tailwind + brand colors as CSS variables -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../Header/header.css" />
  <link rel="preload" href="../Footer/footer.css" />

  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="./product-detail.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      content: [],
      theme: {
        extend: {
          colors: {
            primary: "#033E59",
            accent: "#E6A62C",
          },
          fontFamily: {
            lexend: ["Lexend", "sans-serif"],
            zain: ["Zain", "sans-serif"],
          },
        },
      },
    };
  </script>

</head>
<body class="bg-stone-50 font-sans antialiased text-stone-800">
  <!-- MAIN CONTAINER -->
  <div id="dynamicRoot" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10"></div>

  <!-- VIEW SIMILAR PRODUCTS SECTION  -->
  <section id="similarSection" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10"></section>

  <!-- SOCIAL PROOF SECTION  -->
  <section id="socialSection" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10"></section>

  <section class="px-6 py-10 bg-[#f5f5f5]">
    <div class="relative min-h-[90vh] flex items-center justify-center text-center overflow-hidden rounded-3xl">
      <div class="absolute inset-0"><img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6" alt="Home Decor Background" class="w-full h-full object-cover"/></div>
      <div class="absolute inset-0 bg-white/60 backdrop-blur-[2px]"></div>
      <div class="relative z-10 max-w-3xl px-6">
        <p class="text-sm tracking-[0.3em] text-gray-500 uppercase mb-6">Modern Home Decor</p>
        <h1 class="text-4xl md:text-6xl font-zain font-semibold text-gray-900 leading-tight mb-6">Elevate Your Space <br class="hidden md:block" />With Timeless Design</h1>
        <p class="text-gray-600 font-lexend text-base md:text-lg leading-relaxed mb-10 max-w-xl mx-auto">Discover thoughtfully curated decor pieces that bring warmth, simplicity, and elegance into your living space.</p>
      </div>
    </div>
  </section>

  <!-- INSTALLATION PROCESS SECTION  -->
  <section id="installSection" class="py-16 -mt-10 bg-white"></section>

  <!-- Footer Container -->
  <div id="footer-container"></div>

  <!-- STICKY BOTTOM BAR  -->
  <div id="stickyBar" class="sticky bottom-0 left-0 right-0 z-50 bg-white/25 backdrop-blur-xl border-t border-[#e5e7eb]/70 shadow-2xl md:hidden lg:flex items-center justify-center gap-4 md:gap-6 px-4 py-4 transition-all duration-300 flex-wrap"></div>

  <!-- script loads -->
  <script src="../Header/load-header.js" defer></script>
  <script src="../Header/header.js" defer></script>
  <script src="../Footer/footer-loader.js"></script>
  <script src="./product-detail.js"></script>
</body>
</html>
