<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artezo Store - Home</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/Header/header.css" />
  <link rel="stylesheet" href="./index.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#1D3C4A",
            accent: "#E39F32",
          },
          fontFamily: {
            lexend: ["Lexend", "sans-serif"],
            zain: ["Zain", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>

<body class="bg-white antialiased">

  <!-- DYNAMIC CONTENT WILL BE RENDERED HERE -->
  <div id="app-root"></div>

  <!-- Footer Container -->
  <div id="footer-container"></div>

  <!-- Load external data file (static content) -->
  <script src="./data.js"></script>
  <!-- Load header scripts -->
  <script src="./Header/load-header.js" defer></script>
  <script src="./Header/header.js" defer></script>
  <script src="./Footer/footer-loader.js"></script>
  <script src="./index.js"></script>
  <script src="./services/cart-wishlist-service.js"></script>
  <script src="../services/global-utils.js"></script>


</body>

</html>
